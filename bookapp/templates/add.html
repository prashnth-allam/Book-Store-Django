{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Bookstore</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{% url 'home' %}" style="font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">BookStore</a>
            </div>
            <ul>
                {% if user.is_authenticated %}
                <li style="color:#fff"><span style="color: var(--text-secondary); margin-right: 5px;">User:</span><strong>{{ user.username }}</strong></li>
                {% endif %}
                <li><a href="{% url 'show_book' %}">Dashboard</a></li>
                <li class="logout"><a href="{% url 'logout' %}" class="btn" style="padding: 8px 16px; font-size: 0.9rem; background-color: var(--danger-color);">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container" style="max-width: 600px;">
        <h2>Add Book Data</h2>
        <form action="{% url 'create_book' %}" method="post">
            {% csrf_token %}
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Enter book title" required>
            
            <label for="author">Author</label>
            <input type="text" id="author" name="author" placeholder="Enter author name" required>
            
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" placeholder="Enter ISBN" required>
            
            <label for="price">Price ($)</label>
            <input type="text" id="price" name="price" placeholder="Enter price (e.g. 19.99)" required>
            
            <label for="genre">Genre</label>
            <select id="genre" name="genre">
                <option value="fiction">fiction</option>
                <option value="non-fiction">non-fiction</option>
                <option value="fantasy">fantasy</option>
                <option value="mystery">mystery</option>
            </select>
            
            <br>
            <input type="submit" value="Add Book">
        </form>
    </div>
</body>
</html>
